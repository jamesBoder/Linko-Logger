<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linko</title>
    <style>
      body {
        font-family: "Courier New", monospace;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        background-color: #000;
        color: #0f0;
      }
      header {
        margin-bottom: 20px;
      }
      h1 {
        margin-bottom: 4px;
        text-transform: uppercase;
        border-bottom: 2px solid #0f0;
      }
      p.tagline {
        color: #0a0;
        margin-top: 0;
      }
      input {
        padding: 6px;
        margin: 4px 0;
        background-color: #111;
        border: 1px solid #0f0;
        color: #0f0;
      }
      button {
        padding: 6px 16px;
        margin: 4px 0;
        cursor: pointer;
        background-color: #0f0;
        color: #000;
        border: none;
        font-weight: bold;
        font-family: "Courier New", monospace;
      }
      button:hover {
        background-color: #0a0;
      }
      button.copy-btn {
        padding: 2px 8px;
        font-size: 0.75em;
        background-color: #111;
        color: #0f0;
        border: 1px solid #0f0;
      }
      button.copy-btn:hover {
        background-color: #0f0;
        color: #000;
      }
      a {
        color: #0f0;
        text-decoration: underline;
        font-weight: bold;
      }
      a:hover {
        color: #fff;
      }
      section {
        margin-bottom: 20px;
      }
      #shorten-section {
        display: none;
      }
      .error {
        color: #f00;
        margin-top: 8px;
      }
      #result-box {
        display: none;
        margin-top: 12px;
        border: 1px solid #0f0;
        padding: 10px;
        background-color: #001100;
      }
      #result-box .label {
        color: #0a0;
        font-size: 0.8em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      #result-box .result-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #result-url {
        color: #0f0;
        font-weight: bold;
        word-break: break-all;
      }
      #stats-box {
        margin-bottom: 20px;
        border: 1px solid #0f0;
        padding: 10px;
      }
      #stats-box h3 {
        margin: 0 0 10px 0;
        color: #0f0;
        text-transform: uppercase;
        font-size: 1em;
        border-bottom: 1px solid #0a0;
        padding-bottom: 5px;
      }
      #stats {
        color: #0a0;
        font-size: 0.9em;
      }
      #urls {
        display: none;
        margin-top: 24px;
        border: 1px solid #0f0;
        padding: 10px;
      }
      #urls h2 {
        margin: 0 0 10px 0;
        font-size: 1em;
        text-transform: uppercase;
        border-bottom: 1px solid #0a0;
        padding-bottom: 5px;
        color: #0f0;
      }
      #urls table {
        border-collapse: collapse;
        width: 100%;
      }
      #urls th,
      #urls td {
        text-align: left;
        padding: 4px 8px;
        border-bottom: 1px solid #0a0;
      }
      #urls th {
        color: #0f0;
        text-transform: uppercase;
      }
      #urls td.long-url {
        max-width: 280px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      footer {
        margin-top: 40px;
        border-top: 1px solid #0a0;
        padding-top: 8px;
        color: #0a0;
        font-size: 0.75em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Linko</h1>
      <p class="tagline">A tiny URL shortener.</p>
      <div id="stats-box" style="display: none">
        <h3>Stats since last restart</h3>
        <div id="stats"></div>
        <button onclick="loadStats()">Refresh Stats</button>
      </div>
    </header>

    <main>
      <section id="login-section">
        <form onsubmit="login(event)">
          <input type="text" id="username" placeholder="Username" />
          <input type="password" id="password" placeholder="Password" />
          <button type="submit">Login</button>
        </form>
        <span id="login-error" class="error"></span>
      </section>

      <section id="logged-in-section" style="display: none">
        <p>
          Logged in as <strong id="display-user"></strong>.
          <button onclick="logout()">Logout</button>
        </p>
      </section>

      <section id="shorten-section">
        <form onsubmit="shorten(event)">
          <input
            type="url"
            id="url"
            placeholder="https://example.com/long/url"
            size="40"
          />
          <button type="submit">Shorten</button>
        </form>
        <div id="shorten-error" class="error"></div>
        <div id="result-box">
          <div class="label">Shortened URL</div>
          <div class="result-row">
            <a id="result-url" href="#" target="_blank"></a>
            <button class="copy-btn" onclick="copyResult()">Copy</button>
          </div>
        </div>
      </section>

      <section id="urls">
        <h2>Shortened URLs (<span id="url-count">0</span>)</h2>
        <table>
          <thead>
            <tr>
              <th>Short Code</th>
              <th>Long URL</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="url-list"></tbody>
        </table>
      </section>
    </main>

    <footer>
      linko &mdash; file-based url shortener
    </footer>

    <script>
      let authHeader = null;

      async function loadStats() {
        if (!authHeader) return;
        try {
          const resp = await fetch("/api/stats", {
            headers: { Authorization: authHeader },
          });
          if (resp.status === 401) return;
          const data = await resp.json();
          document.getElementById("stats").textContent =
            `${data.redirects} redirects served, ${data.bytes_saved} bytes saved`;
        } catch (err) {
          document.getElementById("stats").textContent = "";
        }
      }

      function buildRow(shortCode, longURL) {
        const shortURL = `${window.location.origin}/${shortCode}`;
        const tr = document.createElement("tr");
        const tdShort = document.createElement("td");
        tdShort.innerHTML = `<a href="${shortURL}" target="_blank">${shortCode}</a>`;
        const tdLong = document.createElement("td");
        tdLong.className = "long-url";
        tdLong.title = longURL;
        tdLong.innerHTML = `<a href="${longURL}" target="_blank">${longURL}</a>`;
        const tdCopy = document.createElement("td");
        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copy";
        btn.onclick = () => copyToClipboard(shortURL, btn);
        tdCopy.appendChild(btn);
        tr.appendChild(tdShort);
        tr.appendChild(tdLong);
        tr.appendChild(tdCopy);
        return tr;
      }

      function updateCount() {
        const count = document.getElementById("url-list").childElementCount;
        document.getElementById("url-count").textContent = count;
      }

      async function loadURLs() {
        if (!authHeader) return;
        try {
          const resp = await fetch("/api/urls", {
            headers: { Authorization: authHeader },
          });
          if (resp.status === 401) return;

          const data = await resp.json();
          const tbody = document.getElementById("url-list");
          tbody.innerHTML = "";
          data.forEach((entry) => {
            tbody.appendChild(buildRow(entry.short_code, entry.long_url));
          });
          document.getElementById("urls").style.display = "block";
          updateCount();
        } catch (err) {
          console.error("Failed to load URLs:", err);
        }
      }

      async function login(e) {
        e.preventDefault();

        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const tempAuthHeader = "Basic " + btoa(user + ":" + pass);

        try {
          const resp = await fetch("/api/login", {
            method: "POST",
            headers: { Authorization: tempAuthHeader },
          });

          if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text);
          }

          authHeader = tempAuthHeader;
          document.getElementById("login-section").style.display = "none";
          document.getElementById("logged-in-section").style.display = "block";
          document.getElementById("shorten-section").style.display = "block";
          document.getElementById("stats-box").style.display = "block";
          document.getElementById("display-user").textContent = user;
          document.getElementById("login-error").textContent = "";

          loadURLs();
          loadStats();
        } catch (err) {
          document.getElementById("login-error").textContent = err.message;
        }
      }

      function logout() {
        authHeader = null;

        document.getElementById("login-section").style.display = "block";
        document.getElementById("logged-in-section").style.display = "none";
        document.getElementById("shorten-section").style.display = "none";
        document.getElementById("urls").style.display = "none";
        document.getElementById("stats-box").style.display = "none";
        document.getElementById("result-box").style.display = "none";
        document.getElementById("url-list").innerHTML = "";
        document.getElementById("stats").textContent = "";
        document.getElementById("shorten-error").textContent = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      }

      async function shorten(e) {
        e.preventDefault();

        const url = document.getElementById("url").value;
        if (!url) return;

        const body = new URLSearchParams({ url: url });

        try {
          const resp = await fetch("/api/shorten", {
            method: "POST",
            headers: { Authorization: authHeader },
            body: body,
          });

          if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text);
          }

          const code = await resp.text();
          const shortURL = `${window.location.origin}/${code}`;

          const resultLink = document.getElementById("result-url");
          resultLink.href = shortURL;
          resultLink.textContent = shortURL;
          document.getElementById("result-box").style.display = "block";

          const tbody = document.getElementById("url-list");
          const tr = buildRow(code, url);
          if (tbody.firstChild) {
            tbody.insertBefore(tr, tbody.firstChild);
          } else {
            tbody.appendChild(tr);
          }

          document.getElementById("urls").style.display = "block";
          document.getElementById("url").value = "";
          document.getElementById("shorten-error").textContent = "";
          updateCount();
        } catch (err) {
          document.getElementById("shorten-error").textContent = err.message;
        }
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          const orig = btn.textContent;
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = orig), 1500);
        });
      }

      function copyResult() {
        const url = document.getElementById("result-url").href;
        const btn = document.querySelector("#result-box .copy-btn");
        copyToClipboard(url, btn);
      }
    </script>
  </body>
</html>
